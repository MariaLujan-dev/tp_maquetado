<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELSI VENTAS</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="Contacto">
    <header>
      <nav>
        <a href="index.html">
          <img class="logo" src="./img/logo.png" alt="logo" />
        </a>

        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="Catálogo.html">Catálogo</a></li>
          <li><a href="Ofertas.html">Ofertas</a></li>
          <li><a href="Contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
    

      <h1>Contacto</h1>
 /* Inicio de formulario */

      <section class="form-container">

        <form id="form" action="#">

            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" required placeholder="Tu nombre">
            </div>

             <div class="form-group">
                <label for="lastName">Apellido</label>
                <input type="text" required placeholder="Tu apellido">
            </div>

            <div class="form-group">
                <label for="email">Correo Electronico</label>
                <input type="email" required placeholder="Tu email">
            </div>

            <div class="form-group">
                <label for="phone">Teléfono</label>
                <input type="tel" required placeholder="+54 11 1234-5678">
            </div>

            <div class="form-group" >
                <label for="reason">Motivo de contacto</label>
                <select name="reason" id="reason" required>
                    <option value="" disabled selected >Seleccione una opcion</option>
                    <option value="buy">Comprar vehiculo</option>
                    <option value="sell">Vender vehiculo</option>
                    <option value="claim">Reclamo/ Soporte</option>
                    <option value="other">Otro</option>
                </select>
            </div>

             <fieldset>
            <div class="form-group">
                <h3>¿Es cliente nuestro?</h3>
                <div>
                    <input type="radio" required id="client-yes" value="yes" name="is-client" >
                    <label for="client-yes">Sí</label>
                </div>
                <div>
                    <input type="radio" required id="client-no" value="no" name="is-client" >
                    <label for="client-yes">No</label>
                </div>
            </div>
        </fieldset>

            <div class="form-group">
                <label for="comment">Mensaje / Comentario</label>
                <textarea rows="5" cols="60" name="comment" id="comment" required placeholder="Escriba aqui su consulta o mensaje..."></textarea>
            </div>

            <div class="form-group button-container">
                <button class="btn btn-primary" type="submit">Enviar Mensaje</button>
                <button class="btn btn-danger" type="reset">Limpiar Formulario</button>
            </div>

        </form>

       
/* Fin de Formulario*/
</section>


    </main>

    <footer>
      <ul class="footer-nav">
        <li><a href="index.html">Inicio</a></li>

      </ul>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
