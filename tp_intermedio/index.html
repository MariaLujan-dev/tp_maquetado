<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELSI VENTAS</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>

  <!-- Agregamos body class para organizar estilos particulares de la seccion principal -->
  <body class="index">
    <header>
      <nav>
        <a href="index.html">
          <img class="logo" src="./img/logo.png" alt="logo" />
        </a>
 <!-- Enlaces a las secciones desde el nav -->
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="Catálogo.html">Catálogo</a></li>
          <li><a href="Ofertas.html">Ofertas</a></li>
          <li><a href="Contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <!-- Inicio carrusel -->

      <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
          <button
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide-to="0"
            class="active"
            aria-current="true"
            aria-label="Slide 1"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide-to="1"
            aria-label="Slide 2"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide-to="2"
            aria-label="Slide 3"
          ></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="./img/hombrestrabajando.png"
              class="d-block w-75"
              alt="..."
            />
          </div>
          <div class="carousel-item">
            <img src="./img/ombuylibus.png" class="d-block w-75" alt="..." />
          </div>
          <div class="carousel-item">
            <img
              src="./img/elementosdeseguridad.png"
              class="d-block w-75"
              alt="..."
            />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleIndicators"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleIndicators"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>

      <!-- Fin carrusel -->
    </main>

    <footer>
      <ul class="footer-nav">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="Catálogo.html">Catálogo</a></li>
        <li><a href="Ofertas.html">Ofertas</a></li>
        <li><a href="Contacto.html">Contacto</a></li>


       
      </ul>
       <p> ©2026 Elsi ventas, Inc. Todos los derechos reservados. </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
